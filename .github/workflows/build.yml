name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova & Build
        run: |
          npm install -g cordova@11
          cordova create myapp com.calc.secret Calculator
          cd myapp
          cp ../secret-calc-v2-4.html www/index.html
          cordova platform add android@11
          yes | cordova build android --debug
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
