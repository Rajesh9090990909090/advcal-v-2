name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Accept Android Licenses & Setup SDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      - name: Install Cordova & Build APK
        run: |
          npm install -g cordova@12
          cordova create app com.calc.secret Calculator
          cd app
          cp ../secret-calc-v2-4.html www/index.html
          cordova platform add android@12
          cordova build android --debug
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-APK
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
